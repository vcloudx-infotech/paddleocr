<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document OCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-zone:hover {
            border-color: #0d6efd;
            background: #e9ecef;
        }
        .result-card {
            margin-top: 20px;
            display: none;
        }
        .loading {
            display: none;
        }
        .confidence-high {
            color: #198754;
        }
        .confidence-medium {
            color: #ffc107;
        }
        .confidence-low {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Document OCR</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div class="drop-zone" id="dropZone">
                            <h5>Drag & Drop your document here</h5>
                            <p class="text-muted">or</p>
                            <input type="file" id="fileInput" class="d-none" accept=".png,.jpg,.jpeg,.pdf">
                            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                                Choose File
                            </button>
                        </div>
                        
                        <div class="loading text-center mt-3">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Processing your document...</p>
                        </div>

                        <div class="result-card">
                            <h5 class="card-title">Extracted Information</h5>
                            <div id="results" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.querySelector('.loading');
        const resultCard = document.querySelector('.result-card');
        const results = document.getElementById('results');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('border-primary');
        }

        function unhighlight(e) {
            dropZone.classList.remove('border-primary');
        }

        // Handle dropped files
        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFiles, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles({ target: { files: files } });
        }

        function handleFiles(e) {
            const file = e.target.files[0];
            if (file) {
                uploadFile(file);
            }
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            loading.style.display = 'block';
            resultCard.style.display = 'none';
            results.innerHTML = '';

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                if (data.error) {
                    alert(data.error);
                    return;
                }
                displayResults(data.data);
            })
            .catch(error => {
                loading.style.display = 'none';
                alert('Error processing file: ' + error);
            });
        }

        function displayResults(data) {
            resultCard.style.display = 'block';
            results.innerHTML = '';

            // Display card type if available
            if (data.type) {
                const typeDiv = document.createElement('div');
                typeDiv.className = 'mb-3 p-2 border rounded bg-light';
                typeDiv.innerHTML = `<strong>Card Type:</strong> ${data.type.toUpperCase()}`;
                results.appendChild(typeDiv);
            }

            // Display civil number
            if (data.civil_number) {
                const civilDiv = document.createElement('div');
                civilDiv.className = 'mb-2 p-2 border rounded';
                civilDiv.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <span><strong>Civil Number:</strong> ${data.civil_number.value}</span>
                        <span class="confidence-high">
                            Confidence: ${(data.civil_number.confidence * 100).toFixed(1)}%
                        </span>
                    </div>
                `;
                results.appendChild(civilDiv);
            }

            // Display expiry date
            if (data.expiry_date) {
                const expiryDiv = document.createElement('div');
                expiryDiv.className = 'mb-2 p-2 border rounded';
                expiryDiv.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <span><strong>Expiry Date:</strong> ${data.expiry_date.value}</span>
                        <span class="confidence-high">
                            Confidence: ${(data.expiry_date.confidence * 100).toFixed(1)}%
                        </span>
                    </div>
                `;
                results.appendChild(expiryDiv);
            }

            // Display date of birth
            if (data.date_of_birth) {
                const dobDiv = document.createElement('div');
                dobDiv.className = 'mb-2 p-2 border rounded';
                dobDiv.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <span><strong>Date of Birth:</strong> ${data.date_of_birth.value}</span>
                        <span class="confidence-high">
                            Confidence: ${(data.date_of_birth.confidence * 100).toFixed(1)}%
                        </span>
                    </div>
                `;
                results.appendChild(dobDiv);
            }

            // Display signature status
            const signatureDiv = document.createElement('div');
            signatureDiv.className = 'mb-2 p-2 border rounded';
            signatureDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <span><strong>Signature:</strong> ${data.signature.exists ? 'Available' : 'Not Available'}</span>
                    <span class="confidence-high">
                        Confidence: ${(data.signature.confidence * 100).toFixed(1)}%
                    </span>
                </div>
            `;
            results.appendChild(signatureDiv);
        }
    </script>
</body>
</html>
